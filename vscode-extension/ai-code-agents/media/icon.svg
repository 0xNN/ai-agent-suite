<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a1f2e"/>

  <!-- Outer ring -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#00e5cc" stroke-width="2" opacity="0.4"/>

  <!-- Shield shape (security) -->
  <path d="M64 22 L88 34 L88 62 C88 78 76 90 64 96 C52 90 40 78 40 62 L40 34 Z"
        fill="#0f1f1f" stroke="#00e5cc" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Code brackets inside shield -->
  <text x="64" y="72" font-family="monospace" font-size="28" font-weight="700"
        fill="#00e5cc" text-anchor="middle" opacity="0.9">&lt;/&gt;</text>

  <!-- Scan lines (top left) -->
  <circle cx="28" cy="28" r="10" fill="#0f1f1f" stroke="#00e5cc" stroke-width="1.5"/>
  <circle cx="28" cy="28" r="5" fill="none" stroke="#00e5cc" stroke-width="1.5"/>
  <line x1="34" y1="34" x2="40" y2="40" stroke="#00e5cc" stroke-width="2" stroke-linecap="round"/>

  <!-- Dots (agents indicator) -->
  <circle cx="20" cy="64" r="3" fill="#00e5cc" opacity="0.7"/>
  <circle cx="108" cy="64" r="3" fill="#00e5cc" opacity="0.7"/>
  <circle cx="64" cy="20" r="3" fill="#00e5cc" opacity="0.7"/>
  <circle cx="64" cy="108" r="3" fill="#00e5cc" opacity="0.7"/>
</svg>
